# Test profile: local MongoDB (see GitHub Actions CI mongo service). Overrides Atlas from application.properties.
spring.mongodb.uri=mongodb://127.0.0.1:27017/smart_campus_hub_test
spring.mongodb.database=smart_campus_hub_test

# Dummy OAuth client — only used to satisfy Spring Security OAuth2 client registration during tests.
spring.security.oauth2.client.registration.google.client-id=test-ci-client-id
spring.security.oauth2.client.registration.google.client-secret=test-ci-client-secret

logging.level.org.springframework.data.mongodb=WARN
logging.level.org.mongodb.driver=WARN
